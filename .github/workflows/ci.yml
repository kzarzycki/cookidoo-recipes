name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv
      - name: Sync environment
        run: uv sync --group dev
      - name: Unit tests
        run: uv run pytest -q
      - name: Compile
        run: uv run python -m compileall src tests scripts
